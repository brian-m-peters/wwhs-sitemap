<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WWHS — Proposed Sitemap</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --clinician:    #8B7DC8;
      --clinician-bg: #EFECFB;
      --shared:       #5BA86A;
      --shared-bg:    #E8F5EA;
      --client:       #E89C4A;
      --client-bg:    #FEF1E0;
      --utility:      #d9d9d9;
      --sunset:       #D97A7A;
      --sunset-bg:    #FCEAEA;
      --accent:       #7B5EA7;
      --accent-light: rgba(123,94,167,0.1);
      --text:         #18182A;
      --text-sub:     #52526E;
      --text-muted:   #9090A8;
      --border:       #E4E4EE;
      --bg:           #F5F5FA;
      --white:        #FFFFFF;
      --shadow-sm:    0 1px 3px rgba(0,0,0,0.07);
      --shadow-md:    0 4px 14px rgba(0,0,0,0.09);
      --shadow-lg:    0 10px 30px rgba(0,0,0,0.14);
      --footer-h:     52px;
      --radius:       10px;
    }

    html { scroll-behavior: smooth; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; overflow-x: hidden;
    }

    /* ── NAV ─────────────────────────────────────────────── */
    .nav {
      position: sticky; top: 0; z-index: 100;
      background: var(--white); border-bottom: 1px solid var(--border);
      display: flex; align-items: center;
      padding: 0 48px; height: 70px; gap: 12px;
    }
    .nav-brand { display: flex; flex-direction: column; gap: 1px; flex: 1; }
    .nav-brand-name { font-size: 15px; font-weight: 700; letter-spacing: -.3px; }
    .nav-brand-sub  { font-size: 12px; color: var(--text-muted); }
    .nav-right { display: flex; align-items: center; gap: 10px; }

    .version-btn {
      display: inline-flex; align-items: center; gap: 7px;
      font-size: 13px; font-weight: 600; color: var(--text-sub);
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 8px; padding: 7px 13px; cursor: pointer;
      font-family: inherit; transition: all .15s;
    }
    .version-btn:hover { background: #EEEEF6; border-color: #CACAD8; }
    .version-btn svg { opacity: .5; flex-shrink: 0; transition: transform .2s; }
    .version-btn.panel-open svg { transform: rotate(180deg); }

    .btn-feedback {
      display: inline-flex; align-items: center; gap: 8px;
      background: var(--accent); color: #fff; border: none;
      border-radius: 8px; padding: 9px 18px;
      font-size: 13px; font-weight: 600; cursor: pointer;
      font-family: inherit; transition: all .15s;
    }
    .btn-feedback:hover { background: #6B4E97; transform: translateY(-1px); box-shadow: 0 4px 14px rgba(123,94,167,.28); }
    .btn-feedback.active { background: #5D3E85; box-shadow: 0 0 0 3px rgba(123,94,167,.22); }
    .nav-badge {
      background: #fff; color: var(--accent);
      border-radius: 999px; font-size: 11px; font-weight: 700;
      padding: 1px 7px; min-width: 20px; text-align: center; display: none;
    }
    .nav-badge.show { display: inline-block; }

    /* ── MAIN ────────────────────────────────────────────── */
    .main {
      max-width: 1360px; margin: 0 auto;
      padding: 0 48px calc(var(--footer-h) + 40px);
    }

    /* ── KEY ─────────────────────────────────────────────── */
    .key {
      display: flex; align-items: center; justify-content: center;
      gap: 28px; padding: 28px 0 24px;
    }
    .key-item { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text-sub); }
    .key-dot  { width: 6px; height: 22px; border-radius: 3px; flex-shrink: 0; }

    /* ── SECTION LABEL ───────────────────────────────────── */
    .section-label {
      text-align: center; margin-bottom: 16px;
    }
    .section-label-title {
      font-size: 15px; font-weight: 700; color: var(--text); margin-bottom: 3px;
    }
    .section-label-sub {
      font-size: 12px; color: var(--text-muted);
    }

    /* ── SITEMAP CARD — white container for utility + main nav ── */
    .sitemap-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px 28px 32px;
      margin-bottom: 32px;
      box-shadow: var(--shadow-sm);
    }

    /* ── TILE LAYOUTS ────────────────────────────────────── */
    .utility-row {
      display: grid; grid-template-columns: repeat(4, 1fr);
      gap: 10px; margin-bottom: 0;
      align-items: start; /* top-align so tiles expand downward on hover */
    }
    .main-nav-grid {
      display: grid; grid-template-columns: repeat(4, 1fr);
      gap: 10px; align-items: start;
    }
    .nav-col { display: flex; flex-direction: column; gap: 8px; }

    /* Actions row — 2 CTA tiles, centered, spans ~half the card width */
    .actions-row {
      display: grid; grid-template-columns: repeat(2, 1fr);
      gap: 10px; margin-bottom: 20px;
      max-width: 52%; margin-left: auto; margin-right: auto;
    }

    .footer-row {
      display: flex; justify-content: center; margin-bottom: 32px;
    }
    .footer-row .tile { max-width: 860px; width: 100%; }

    /* Not in Nav section — 2 rows of 3 columns */
    .not-in-nav-grid {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 10px; align-items: start;
    }

    /* Nurse Stories section */
    .ns-header-wrap { margin-bottom: 12px; max-width: 860px; margin-left: auto; margin-right: auto; }
    .ns-options {
      display: grid; grid-template-columns: repeat(2, 1fr);
      gap: 10px; align-items: start;
      max-width: 860px; margin: 0 auto;
    }

    /* No left indicator bar */
    .tile.no-indicator::before { display: none; }
    .tile.no-indicator { padding-left: 20px; }

    /* Sign Up CTA — custom fill */
    .tile[data-tile-id="sign-up"] { background: #F7F7FF !important; border-color: #D8D8F0 !important; }

    .sunset-section {
      display: flex; flex-direction: column; align-items: center; gap: 10px;
    }
    .sunset-label-wrap { display: flex; justify-content: center; }
    .sunset-label-wrap .tile { min-width: 260px; }
    .sunset-grid {
      display: grid; grid-template-columns: repeat(2, 1fr);
      gap: 8px; width: 100%; align-items: start;
    }

    /* ── BASE TILE ───────────────────────────────────────── */
    .tile {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px 20px 24px 26px;  /* generous vertical, 26px left for indicator */
      position: relative; overflow: hidden;
      transition: box-shadow .18s, transform .18s, border-color .18s;
      text-align: center;
    }
    /* Left indicator bar */
    .tile::before {
      content: '';
      position: absolute; left: 0; top: 0; bottom: 0; width: 6px;
      border-radius: var(--radius) 0 0 var(--radius);
    }

    /* ── SPECIAL: Utility Nav header — borderless label ── */
    .tile.utility-section-label {
      background: transparent !important;
      border-color: transparent !important;
      box-shadow: none !important;
      cursor: default;
      padding-left: 18px;
    }
    .tile.utility-section-label::before { display: none; }
    .tile.utility-section-label:hover   { transform: none !important; box-shadow: none !important; }
    .tile.utility-section-label .tile-title    { font-size: 15px; font-weight: 700; }
    .tile.utility-section-label .tile-subtitle { font-size: 12px; font-weight: 400; color: var(--text-muted); }

    /* ── TYPE: colored borders on ALL tiles ──────────────── */
    .tile[data-type="clinician"] { border-color: rgba(139,125,200,.28); }
    .tile[data-type="shared"]    { border-color: rgba(91,168,106,.28); }
    .tile[data-type="client"]    { border-color: rgba(232,156,74,.28); }
    .tile[data-type="utility"]   { border-color: #e8e8e8; }
    .tile[data-type="sunset"]    { border-color: rgba(217,122,122,.28); }

    /* ── LABEL TILES — colored fills ─────────────────────── */
    .tile.is-label[data-type="clinician"] { background: var(--clinician-bg); border-color: #D5CEEF; }
    .tile.is-label[data-type="shared"]    { background: var(--shared-bg);    border-color: #C0DFBF; }
    .tile.is-label[data-type="client"]    { background: var(--client-bg);    border-color: #F0D0A0; }
    .tile.is-label[data-type="sunset"]    { background: var(--sunset-bg);    border-color: #F0C0C0; }
    .tile.is-label[data-type="utility"]   { background: var(--white); }

    /* ── INDICATOR COLORS ────────────────────────────────── */
    .tile[data-type="clinician"]::before { background: var(--clinician); }
    .tile[data-type="shared"]::before    { background: var(--shared); }
    .tile[data-type="client"]::before    { background: var(--client); }
    .tile[data-type="utility"]::before   { background: var(--utility); }
    .tile[data-type="sunset"]::before    { background: var(--sunset); }

    /* ── INTERACTIONS ────────────────────────────────────── */
    .tile:not(.is-label):not(.utility-section-label) { cursor: pointer; }
    .tile:not(.is-label):not(.utility-section-label):hover,
    .tile.hovered:not(.is-label):not(.utility-section-label) {
      transform: translateY(-2px);
      box-shadow: var(--shadow-md);
    }
    .tile.is-label { cursor: default; }
    .tile.is-label:hover { transform: none; box-shadow: none; }

    /* Comment target ring */
    .tile.comment-target {
      border-color: var(--accent) !important;
      box-shadow: 0 0 0 2.5px rgba(123,94,167,.4) !important;
      transform: none !important;
    }
    /* Has-comments dot */
    .tile.has-comments::after {
      content: ''; position: absolute; top: 10px; right: 10px;
      width: 7px; height: 7px; border-radius: 50%; background: var(--accent);
    }

    /* Selecting-mode */
    body.selecting-tile .tile:not(.is-label):not(.utility-section-label) { cursor: crosshair; }
    body.selecting-tile .tile:not(.is-label):not(.utility-section-label):hover {
      border-color: var(--accent);
      box-shadow: 0 0 0 1.5px rgba(123,94,167,.25);
    }

    /* ── TILE CONTENT ────────────────────────────────────── */
    .tile-title    { font-size: 18px; font-weight: 700; line-height: 1.25; margin-bottom: 6px; }
    .tile-subtitle { font-size: 13px; font-weight: 600; color: var(--text-sub); margin-bottom: 8px; }
    .tile-desc {
      font-size: 13px; color: var(--text-sub); line-height: 1.65;
      overflow: hidden;
      max-height: 43px; /* ~2 lines collapsed */
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      transition: max-height 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .tile.hovered .tile-desc,
    .tile.locked  .tile-desc {
      display: block;
      -webkit-line-clamp: unset;
      max-height: 700px;
    }

    /* Expand hint — absolute top-right, no layout impact */
    .tile-hint {
      position: absolute; top: 13px; right: 14px;
      font-size: 11px; color: var(--text-muted);
      opacity: 0; transition: opacity .15s;
      pointer-events: none; white-space: nowrap;
    }
    .tile:not(.is-label):not(.utility-section-label):hover .tile-hint,
    .tile.hovered .tile-hint,
    .tile.locked  .tile-hint { opacity: 1; }

    /* ── OVERLAY (version panel only) ────────────────────── */
    .overlay {
      position: fixed; inset: 0; background: rgba(10,10,30,.18);
      z-index: 200; opacity: 0; pointer-events: none; transition: opacity .2s;
    }
    .overlay.show { opacity: 1; pointer-events: all; }

    /* ── VERSION PANEL ───────────────────────────────────── */
    .version-panel {
      position: fixed; top: 70px; right: 16px;
      width: 500px; background: var(--white);
      border: 1px solid var(--border); border-radius: 14px;
      box-shadow: var(--shadow-lg); z-index: 201; overflow: hidden;
      opacity: 0; pointer-events: none; transform: translateY(-8px);
      transition: opacity .18s, transform .18s;
    }
    .version-panel.open { opacity: 1; pointer-events: all; transform: translateY(0); }
    .vp-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 20px; border-bottom: 1px solid var(--border);
    }
    .vp-header h3 { font-size: 14px; font-weight: 700; }
    .icon-btn {
      background: none; border: none; cursor: pointer; color: var(--text-muted);
      padding: 5px; border-radius: 6px; display: flex; align-items: center;
      font-family: inherit; transition: all .15s;
    }
    .icon-btn:hover { background: var(--bg); color: var(--text); }
    .vp-list { max-height: 300px; overflow-y: auto; }
    .version-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 13px 20px; border-bottom: 1px solid var(--border);
      transition: background .12s;
    }
    .version-row:last-child { border-bottom: none; }
    .version-row:hover { background: var(--bg); }
    .version-row.active { background: rgba(123,94,167,.05); }
    .vr-left { display: flex; flex-direction: column; gap: 3px; }
    .vr-name { font-size: 14px; font-weight: 700; }
    .vr-changelog { font-size: 12px; color: var(--text-muted); }
    .vr-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .vr-count { font-size: 12px; color: var(--text-muted); }
    .vr-badge { background: var(--accent); color: #fff; font-size: 10px; font-weight: 700; padding: 2px 9px; border-radius: 999px; }
    .vr-switch-btn {
      font-size: 11px; color: var(--accent); background: var(--accent-light);
      border: none; border-radius: 5px; padding: 4px 10px;
      cursor: pointer; font-family: inherit; font-weight: 600; transition: all .12s;
    }
    .vr-switch-btn:hover { background: rgba(123,94,167,.2); }
    .vr-delete-btn {
      font-size: 11px; color: #C0392B; background: #FEE9E7;
      border: none; border-radius: 5px; padding: 4px 10px;
      cursor: pointer; font-family: inherit; font-weight: 600; transition: all .12s;
    }
    .vr-delete-btn:hover { background: #FCD4CF; }
    .new-version-form {
      padding: 16px 20px; border-top: 1px solid var(--border);
      display: flex; flex-direction: column; gap: 10px;
    }
    .nv-title { font-size: 12px; font-weight: 700; color: var(--text-sub); }
    .nv-row { display: flex; gap: 8px; }
    .nv-input {
      flex: 1; border: 1px solid var(--border); border-radius: 8px;
      padding: 9px 12px; font-family: inherit; font-size: 13px;
      color: var(--text); outline: none; background: var(--bg); transition: border-color .15s;
    }
    .nv-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(123,94,167,.1); }
    .nv-input::placeholder { color: var(--text-muted); }
    .nv-name { width: 90px; flex: none; }
    .btn-create {
      background: var(--accent); color: #fff; border: none; border-radius: 8px;
      padding: 9px 18px; font-size: 13px; font-weight: 600; cursor: pointer;
      font-family: inherit; transition: all .15s; align-self: flex-end;
    }
    .btn-create:hover { background: #6B4E97; }

    /* ── VIEWING BANNER ──────────────────────────────────── */
    .viewing-banner {
      position: sticky; top: 70px; z-index: 90;
      background: #FEF9EC; border-bottom: 1px solid #FDDEA0;
      padding: 10px 48px; font-size: 13px; color: #8A5F0A;
      display: none; align-items: center; gap: 10px;
    }
    .viewing-banner.show { display: flex; }
    .viewing-banner strong { font-weight: 700; }
    .viewing-banner button {
      margin-left: auto; font-size: 12px; font-weight: 600;
      color: var(--accent); background: none; border: none; cursor: pointer; font-family: inherit;
    }

    /* ── FLOATING FEEDBACK WINDOW ────────────────────────── */
    .feedback-window {
      position: fixed;
      bottom: calc(var(--footer-h) + 16px); right: 24px;
      width: 360px; max-height: 560px;
      background: var(--white); border: 1px solid var(--border);
      border-radius: 14px; box-shadow: var(--shadow-lg);
      z-index: 300; display: flex; flex-direction: column;
      opacity: 0; pointer-events: none;
      transform: scale(.97) translateY(6px);
      transition: opacity .2s, transform .2s;
      overflow: hidden;
    }
    .feedback-window.open { opacity: 1; pointer-events: all; transform: scale(1) translateY(0); }
    .feedback-window.minimized .fw-body,
    .feedback-window.minimized .fw-footer { display: none; }
    .feedback-window.dragging { transition: none; box-shadow: 0 16px 48px rgba(0,0,0,.18); }

    /* Handle */
    .fw-handle {
      display: flex; align-items: center; gap: 10px; padding: 14px 16px;
      border-bottom: 1px solid var(--border); cursor: grab; flex-shrink: 0;
      background: var(--white); border-radius: 14px 14px 0 0; user-select: none;
    }
    .feedback-window.minimized .fw-handle { border-bottom: none; border-radius: 14px; }
    .fw-handle:active { cursor: grabbing; }
    .fw-handle-title { display: flex; align-items: center; gap: 8px; flex: 1; font-size: 14px; font-weight: 700; }
    .fw-window-badge {
      background: var(--accent); color: #fff;
      border-radius: 999px; font-size: 11px; font-weight: 700;
      padding: 1px 7px; min-width: 20px; text-align: center; display: none;
    }
    .fw-window-badge.show { display: inline-block; }
    .fw-actions { display: flex; gap: 4px; }
    .fw-btn {
      background: none; border: none; cursor: pointer; color: var(--text-muted);
      width: 26px; height: 26px; border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; font-family: inherit; transition: all .12s; line-height: 1;
    }
    .fw-btn:hover { background: var(--bg); color: var(--text); }

    /* Tile hint strip */
    .fw-tile-hint {
      padding: 9px 16px; background: var(--accent-light);
      border-bottom: 1px solid rgba(123,94,167,.15);
      font-size: 11.5px; color: var(--accent); flex-shrink: 0;
      display: none; align-items: center; gap: 8px; line-height: 1.4;
    }
    .fw-tile-hint.show { display: flex; }

    /* Version strip */
    .fw-version-strip { padding: 9px 16px; font-size: 12px; flex-shrink: 0; display: none; }
    .fw-version-strip.show { display: block; }
    .fw-version-strip.current { background: rgba(123,94,167,.06); color: var(--accent); border-bottom: 1px solid rgba(123,94,167,.12); }
    .fw-version-strip.readonly { background: #FEF9EC; color: #C47B20; border-bottom: 1px solid rgba(196,123,32,.15); }
    .fw-version-strip strong { font-weight: 700; }
    .fw-version-strip p { margin-top: 2px; font-size: 11.5px; opacity: .85; }

    /* Body */
    .fw-body { flex: 1; overflow-y: auto; padding: 14px 16px; min-height: 0; }
    .fw-count-label {
      font-size: 10.5px; font-weight: 700; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: .6px; margin-bottom: 10px; display: block;
    }
    .fw-comments { display: flex; flex-direction: column; gap: 8px; }
    .no-comments { text-align: center; padding: 28px 12px; }
    .no-comments strong { display: block; font-size: 14px; margin-bottom: 6px; color: var(--text-sub); }
    .no-comments span   { font-size: 12px; color: var(--text-muted); line-height: 1.6; }

    .comment-card { border: 1px solid var(--border); border-radius: 10px; padding: 11px 12px; background: var(--bg); }
    .comment-card.on-tile { border-left: 3px solid var(--accent); }
    .cc-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 6px; }
    .cc-meta   { display: flex; flex-direction: column; gap: 2px; }
    .cc-author { font-size: 11.5px; font-weight: 700; }
    .cc-time   { font-size: 10.5px; color: var(--text-muted); }
    .cc-right  { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
    .cc-tag { font-size: 10.5px; background: var(--accent-light); color: var(--accent); padding: 2px 8px; border-radius: 999px; font-weight: 600; }
    .cc-del { background: none; border: none; cursor: pointer; color: var(--text-muted); padding: 2px 6px; border-radius: 4px; font-size: 11px; font-family: inherit; transition: all .12s; }
    .cc-del:hover { background: #FEE2E2; color: #DC2626; }
    .cc-body { font-size: 12px; color: var(--text-sub); line-height: 1.55; }

    /* Feedback footer */
    .fw-footer { padding: 12px 16px; border-top: 1px solid var(--border); flex-shrink: 0; }
    .fw-footer.readonly { opacity: .45; pointer-events: none; }
    .fw-target-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; min-height: 22px; }
    .fw-target-label { font-size: 11.5px; color: var(--text-muted); }
    .fw-target-chip {
      display: none; align-items: center; gap: 5px;
      background: var(--accent-light); color: var(--accent);
      border-radius: 999px; font-size: 11px; font-weight: 600;
      padding: 2px 9px 2px 11px;
    }
    .fw-target-chip.show { display: inline-flex; }
    .fw-target-chip button { background: none; border: none; cursor: pointer; color: var(--accent); font-size: 13px; line-height: 1; padding: 0; opacity: .7; }
    .fw-target-chip button:hover { opacity: 1; }
    .fw-select-btn {
      font-size: 11.5px; color: var(--accent); background: none; border: none;
      cursor: pointer; padding: 2px 0; font-family: inherit;
      text-decoration: underline; text-decoration-color: transparent; transition: text-decoration-color .15s;
    }
    .fw-select-btn:hover { text-decoration-color: var(--accent); }
    body.selecting-tile .fw-select-btn { font-weight: 700; text-decoration-color: var(--accent); }
    .fw-textarea {
      width: 100%; min-height: 68px; border: 1px solid var(--border); border-radius: 8px;
      padding: 10px 12px; font-family: inherit; font-size: 12.5px;
      color: var(--text); resize: vertical; outline: none; background: var(--bg);
      transition: border-color .15s, box-shadow .15s;
    }

const STORAGE_KEY = 'wwhs-sitemap-v8';
const STATS_KEY   = 'wwhs-stats-v2';
const VISITOR_KEY = 'wwhs-visitor-id';

function loadStorage() {
  try { const r = localStorage.getItem(STORAGE_KEY); if (r) return JSON.parse(r); } catch(e) {}
  return {
    currentVersion: 'v.01',
    versions: { 'v.01': { name:'v.01', date: new Date().toISOString(), changelog:'Initial proposed sitemap.', comments:[] } }
  };
}
function saveStorage() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state.storage)); }

// ── Supabase client ──────────────────────────────────────
const _sb = window.supabase.createClient(
  'https://qzlgwhozmoyumrxcniuc.supabase.co',
  'sb_publishable_r4eEiYEHtOGR88Drq6um1w_rzuXhT8J'
);

async function initVisitor() {
  let id = localStorage.getItem(VISITOR_KEY);
  if (!id) {
    id = 'v' + Date.now() + '_' + Math.random().toString(36).substr(2, 8);
    localStorage.setItem(VISITOR_KEY, id);
  }

  try {
    // Check if this visitor already exists
    const { data: existing } = await _sb
      .from('visitors')
      .select('id')
      .eq('id', id)
      .maybeSingle();

    // Insert if new
    if (!existing) {
      await _sb.from('visitors').insert({ id, first_seen: new Date().toISOString() });
    }

    // Fetch total row count
    const { count } = await _sb
      .from('visitors')
      .select('*', { count: 'exact', head: true });

    document.getElementById('sfVisitors').textContent = count ?? '—';
  } catch (err) {
    // Fallback: use localStorage visitor list
    try {
      const stats = JSON.parse(localStorage.getItem(STATS_KEY) || '{"visitors":[]}');
      if (!stats.visitors.includes(id)) stats.visitors.push(id);
      localStorage.setItem(STATS_KEY, JSON.stringify(stats));
      document.getElementById('sfVisitors').textContent = stats.visitors.length;
    } catch (_) {
      document.getElementById('sfVisitors').textContent = '1';
    }
  }
}

function getTotalFeedback() {
  return Object.values(state.storage.versions).reduce((s,v) => s + (v.comments?.length||0), 0);
}

function makeTile(tile) {
  const el = document.createElement('div');
  const isUtilityHeader = tile.isUtilityHeader;
  el.className = 'tile' + (tile.isLabel ? ' is-label' : '') + (isUtilityHeader ? ' utility-section-label' : '') + (tile.noIndicator ? ' no-indicator' : '');
  el.dataset.tileId = tile.id;
  el.setAttribute('data-type', tile.type);

  let html = `<div class="tile-title">${tile.title}</div>`;
  if (tile.subtitle) html += `<div class="tile-subtitle">${tile.subtitle}</div>`;

  const hasDesc = !tile.isLabel && tile.desc;
  if (hasDesc) {
    html += `<div class="tile-desc">${tile.desc}</div>`;
    html += `<div class="tile-hint"><span class="hint-text">Click to pin</span></div>`;
  }
  el.innerHTML = html;

  if (!tile.isLabel && !isUtilityHeader) {
    el.addEventListener('mouseenter', () => {
      if (hasDesc) el.classList.add('hovered');
    });
    el.addEventListener('mouseleave', () => el.classList.remove('hovered'));

    el.addEventListener('click', (e) => {
      if (state.selectingTile) {
        e.stopPropagation();
        setTarget({ id: tile.id, title: tile.title });
        endSelecting();
        return;
      }
      if (state.windowOpen) {
        e.stopPropagation();
        if (state.commentTarget?.id === tile.id) {
          clearTarget();
        } else {
          setTarget({ id: tile.id, title: tile.title });
          if (hasDesc) { el.classList.add('locked'); const h = el.querySelector('.hint-text'); if (h) h.textContent = 'Click to unpin'; }
        }
        return;
      }
      if (!hasDesc) return; // label-only tiles don't expand
      const locked = el.classList.toggle('locked');
      const hint = el.querySelector('.hint-text');
      if (hint) hint.textContent = locked ? 'Click to unpin' : 'Click to pin';
    });
  }
  return el;
}

// ═══════════════════════════════════════════════════════════
//  RENDER SITEMAP
// ═══════════════════════════════════════════════════════════

function renderSitemap() {
  const c = document.getElementById('sitemapContainer');
  c.innerHTML = '';

  SITEMAP.forEach(s => {
    if (s.layout === 'utility-row') {
      const card = document.createElement('div'); card.className = 'sitemap-card';
      const row = document.createElement('div'); row.className = 'utility-row';
      s.tiles.forEach(t => row.appendChild(makeTile(t)));
      card.appendChild(row);
      c.appendChild(card);

    } else if (s.layout === 'main-nav-grid') {
      const card = document.createElement('div'); card.className = 'sitemap-card';
      if (s.sectionLabel) {
        const lbl = document.createElement('div'); lbl.className = 'section-label';
        lbl.innerHTML = `<div class="section-label-title">${s.sectionLabel.title}</div><div class="section-label-sub">${s.sectionLabel.subtitle}</div>`;
        card.appendChild(lbl);
      }
      if (s.actions) {
        const ar = document.createElement('div'); ar.className = 'actions-row';
        s.actions.forEach(t => ar.appendChild(makeTile(t)));
        card.appendChild(ar);
      }
      const grid = document.createElement('div'); grid.className = 'main-nav-grid';
      s.columns.forEach(col => {
        const colEl = document.createElement('div'); colEl.className = 'nav-col';
        col.tiles.forEach(t => colEl.appendChild(makeTile(t)));
        grid.appendChild(colEl);
      });
      card.appendChild(grid);
      c.appendChild(card);

    } else if (s.layout === 'footer-row') {
      const row = document.createElement('div'); row.className = 'footer-row';
      s.tiles.forEach(t => row.appendChild(makeTile(t)));
      c.appendChild(row);

    } else if (s.layout === 'not-in-nav-section') {
      const card = document.createElement('div'); card.className = 'sitemap-card';
      if (s.sectionLabel) {
        const lbl = document.createElement('div'); lbl.className = 'section-label';
        lbl.innerHTML = `<div class="section-label-title">${s.sectionLabel.title}</div><div class="section-label-sub">${s.sectionLabel.subtitle}</div>`;
        card.appendChild(lbl);
      }
      const grid = document.createElement('div'); grid.className = 'not-in-nav-grid';
      s.tiles.forEach(t => grid.appendChild(makeTile(t)));
      card.appendChild(grid);
      c.appendChild(card);

    } else if (s.layout === 'nurse-stories-section') {
      const card = document.createElement('div'); card.className = 'sitemap-card';
      if (s.sectionLabel) {
        const lbl = document.createElement('div'); lbl.className = 'section-label';
        lbl.innerHTML = `<div class="section-label-title">${s.sectionLabel.title}</div><div class="section-label-sub">${s.sectionLabel.subtitle}</div>`;
        card.appendChild(lbl);
      }
      const hw = document.createElement('div'); hw.className = 'ns-header-wrap';
      hw.appendChild(makeTile(s.header));
      card.appendChild(hw);
      const opts = document.createElement('div'); opts.className = 'ns-options';
      s.options.forEach(t => opts.appendChild(makeTile(t)));
      card.appendChild(opts);
      c.appendChild(card);

    } else if (s.layout === 'sunset-section') {
      const wrap = document.createElement('div'); wrap.className = 'sunset-section';
      const lw = document.createElement('div'); lw.className = 'sunset-label-wrap';
      lw.appendChild(makeTile(s.label)); wrap.appendChild(lw);
      const grid = document.createElement('div'); grid.className = 'sunset-grid';
      s.tiles.forEach(t => grid.appendChild(makeTile(t)));
      wrap.appendChild(grid); c.appendChild(wrap);
    }
  });

  refreshDots();
}

function refreshDots() {
  document.querySelectorAll('.tile').forEach(el => el.classList.remove('has-comments'));
  cmts(cur()).forEach(c => {
    if (c.tileId) {
      const el = document.querySelector(`[data-tile-id="${c.tileId}"]`);
      if (el) el.classList.add('has-comments');
    }
  });
}

// ═══════════════════════════════════════════════════════════
//  FEEDBACK WINDOW
// ═══════════════════════════════════════════════════════════

const fw = document.getElementById('feedbackWindow');

function openWindow() {
  state.windowOpen = true;
  fw.classList.add('open');
  if (state.minimized) { state.minimized = false; fw.classList.remove('minimized'); document.getElementById('fwMinimize').textContent = '−'; }
  document.getElementById('feedbackToggle').classList.add('active');
  document.getElementById('fwTileHint').classList.add('show');
  renderFeedback();
}

function closeWindow() {
  state.windowOpen = false;
  fw.classList.remove('open');
  document.getElementById('feedbackToggle').classList.remove('active');
  document.getElementById('fwTileHint').classList.remove('show');
  endSelecting(); clearTarget();
}

function toggleMinimize() {
  state.minimized = !state.minimized;
  fw.classList.toggle('minimized', state.minimized);
  document.getElementById('fwMinimize').textContent = state.minimized ? '+' : '−';
}

function renderFeedback() {
  const data     = vd(view());
  const comments = data?.comments || [];
  const readonly = !isCur();

  const strip = document.getElementById('fwVersionStrip');
  if (data?.changelog) {
    strip.className = 'fw-version-strip show ' + (readonly ? 'readonly' : 'current');
    document.getElementById('fwVersionName').textContent      = data.name + (readonly ? ' (read-only)' : ' (current)');
    document.getElementById('fwVersionChangelog').textContent  = data.changelog;
  } else { strip.className = 'fw-version-strip'; }

  document.getElementById('fwFooter').classList.toggle('readonly', readonly);

  const cnt = comments.length;
  document.getElementById('fwCountLabel').textContent = cnt === 1 ? '1 comment' : `${cnt} comments`;

  const list = document.getElementById('fwComments'); list.innerHTML = '';
  if (cnt === 0) {
    list.innerHTML = `<div class="no-comments"><strong>No feedback yet</strong><span>${readonly ? 'No comments were left on this version.' : 'Post a general note or click a tile to target a specific page.'}</span></div>`;
    return;
  }
  [...comments].reverse().forEach(c => {
    const card = document.createElement('div');
    card.className = 'comment-card' + (c.tileId ? ' on-tile' : '');
    const t = new Date(c.timestamp);
    const ts = t.toLocaleDateString('en-US',{month:'short',day:'numeric'}) + ' · ' +
               t.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
    card.innerHTML = `
      <div class="cc-top">
        <div class="cc-meta"><span class="cc-author">${esc(c.author||'Anonymous')}</span><span class="cc-time">${ts}</span></div>
        <div class="cc-right">
          ${c.tileName ? `<span class="cc-tag">${esc(c.tileName)}</span>` : ''}
          ${!readonly ? `<button class="cc-del" data-id="${c.id}">Remove</button>` : ''}
        </div>
      </div>
      <div class="cc-body">${esc(c.text)}</div>`;
    card.querySelector('.cc-del')?.addEventListener('click', () => deleteComment(c.id));
    list.appendChild(card);
  });
}

function deleteComment(id) {
  vd(cur()).comments = vd(cur()).comments.filter(c => c.id !== id);
  saveStorage(); renderFeedback(); updateBadges(); updateFooter(); refreshDots();
}

function postComment() {
  const text = document.getElementById('fwTextarea').value.trim();
  if (!text) return;
  vd(cur()).comments.push({
    id: 'c_' + Date.now(),
    tileId:   state.commentTarget?.id    || null,
    tileName: state.commentTarget?.title || null,
    text, author: document.getElementById('fwAuthor').value.trim() || 'Anonymous',
    timestamp: new Date().toISOString()
  });
  saveStorage();
  document.getElementById('fwTextarea').value = '';
  clearTarget(); renderFeedback(); updateBadges(); updateFooter(); refreshDots();
  document.getElementById('fwBody').scrollTop = 0;
}

// ═══════════════════════════════════════════════════════════
//  TILE TARGETING
// ═══════════════════════════════════════════════════════════

function setTarget(target) {
  state.commentTarget = target;
  document.getElementById('fwTargetLabel').textContent = target.title;
  document.getElementById('fwTargetChip').classList.add('show');
  document.getElementById('fwSelectBtn').textContent = 'change tile';
  document.querySelectorAll('.tile.comment-target').forEach(el => el.classList.remove('comment-target'));
  const el = document.querySelector(`[data-tile-id="${target.id}"]`);
  if (el) { el.classList.add('comment-target'); el.scrollIntoView({ behavior:'smooth', block:'nearest' }); }
}

function clearTarget() {
  state.commentTarget = null;
  document.getElementById('fwTargetChip').classList.remove('show');
  document.getElementById('fwSelectBtn').textContent = 'select a tile';
  document.querySelectorAll('.tile.comment-target').forEach(el => el.classList.remove('comment-target'));
}

function startSelecting() { state.selectingTile = true; document.body.classList.add('selecting-tile'); }
function endSelecting()   { state.selectingTile = false; document.body.classList.remove('selecting-tile'); }

// ═══════════════════════════════════════════════════════════
//  VERSION PANEL
// ═══════════════════════════════════════════════════════════

function openVersionPanel() {
  state.versionOpen = true;
  document.getElementById('versionPanel').classList.add('open');
  document.getElementById('overlay').classList.add('show');
  document.getElementById('versionToggle').classList.add('panel-open');
  renderVersionList(); suggestNext();
}
function closeVersionPanel() {
  state.versionOpen = false;
  document.getElementById('versionPanel').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
  document.getElementById('versionToggle').classList.remove('panel-open');
}

function renderVersionList() {
  const list = document.getElementById('versionList'); list.innerHTML = '';
  Object.values(state.storage.versions)
    .sort((a,b) => new Date(b.date)-new Date(a.date))
    .forEach(v => {
      const isCurrent = v.name === cur();
      const isViewing = v.name === view();
      const count     = v.comments.length;
      const row = document.createElement('div');
      row.className = 'version-row' + (isViewing ? ' active' : '');
      row.innerHTML = `
        <div class="vr-left">
          <span class="vr-name">${esc(v.name)}</span>
          <span class="vr-changelog">${esc(v.changelog||'')}</span>
        </div>
        <div class="vr-right">
          <span class="vr-count">${count} ${count===1?'comment':'comments'}</span>
          ${isCurrent
            ? '<span class="vr-badge">Current</span>'
            : `<button class="vr-switch-btn" data-v="${esc(v.name)}">View</button>
               <button class="vr-delete-btn" data-v="${esc(v.name)}">Delete</button>`}
        </div>`;
      row.querySelector('.vr-switch-btn')?.addEventListener('click', e => { e.stopPropagation(); switchVersion(v.name); });
      row.querySelector('.vr-delete-btn')?.addEventListener('click', e => { e.stopPropagation(); deleteVersion(v.name); });
      list.appendChild(row);
    });
}

function deleteVersion(name) {
  if (name === cur()) return;
  if (!confirm(`Delete "${name}"? This will permanently remove ${vd(name).comments.length} comment(s).`)) return;
  delete state.storage.versions[name];
  if (state.viewingVersion === name) { state.viewingVersion = null; hideBanner(); if (state.windowOpen) renderFeedback(); }
  saveStorage(); renderVersionList(); updateFooter();
}

function suggestNext() {
  const max = Object.keys(state.storage.versions).reduce((m,v) => { const n=parseInt(v.replace(/\D/g,'')); return isNaN(n)?m:Math.max(m,n); }, 0);
  document.getElementById('nvName').placeholder = `v.${String(max+1).padStart(2,'0')}`;
  document.getElementById('nvName').value = ''; document.getElementById('nvChangelog').value = '';
}

function createVersion() {
  let name = document.getElementById('nvName').value.trim() || document.getElementById('nvName').placeholder;
  const changelog = document.getElementById('nvChangelog').value.trim();
  if (state.storage.versions[name]) { alert(`"${name}" already exists.`); return; }
  state.storage.versions[name] = { name, date: new Date().toISOString(), changelog: changelog||`Created ${name}`, comments:[] };
  state.storage.currentVersion = name;
  state.viewingVersion = null;
  saveStorage(); hideBanner(); updateVersionLabel(); updateBadges(); updateFooter();
  renderVersionList(); if (state.windowOpen) renderFeedback(); suggestNext();
}

function switchVersion(name) {
  state.viewingVersion = name === cur() ? null : name;
  name === cur() ? hideBanner() : showBanner(name);
  closeVersionPanel(); if (state.windowOpen) renderFeedback();
}

function showBanner(n) { document.getElementById('viewingVersionLabel').textContent = n; document.getElementById('viewingBanner').classList.add('show'); }
function hideBanner()  { document.getElementById('viewingBanner').classList.remove('show'); }

// ═══════════════════════════════════════════════════════════
//  BADGES + FOOTER
// ═══════════════════════════════════════════════════════════

function updateBadges() {
  const n = cmts(cur()).length;
  [document.getElementById('navBadge'), document.getElementById('fwBadge')].forEach(b => {
    b.textContent = n; b.classList.toggle('show', n > 0);
  });
}

function updateVersionLabel() {
  document.getElementById('currentVersionLabel').textContent = cur();
}

function updateFooter() {
  document.getElementById('sfFeedback').textContent = getTotalFeedback();
}

// ═══════════════════════════════════════════════════════════
//  DRAGGABLE FEEDBACK WINDOW
// ═══════════════════════════════════════════════════════════

(function initDrag() {
  const handle = document.getElementById('fwHandle');
  let dragging = false, startX, startY, origLeft, origTop;

  function begin(cx, cy) {
    dragging = true; fw.classList.add('dragging');
    const r = fw.getBoundingClientRect();
    startX = cx; startY = cy; origLeft = r.left; origTop = r.top;
    fw.style.right = 'auto'; fw.style.bottom = 'auto';
    fw.style.left = origLeft + 'px'; fw.style.top = origTop + 'px';
  }
  function move(cx, cy) {
    if (!dragging) return;
    const nx = Math.max(0, Math.min(window.innerWidth  - fw.offsetWidth,  origLeft + (cx - startX)));
    const ny = Math.max(0, Math.min(window.innerHeight - fw.offsetHeight, origTop  + (cy - startY)));
    fw.style.left = nx + 'px'; fw.style.top = ny + 'px';
  }
  function end() { dragging = false; fw.classList.remove('dragging'); }

  handle.addEventListener('mousedown', e => { if (e.target.closest('button')) return; begin(e.clientX, e.clientY); e.preventDefault(); });
  document.addEventListener('mousemove', e => move(e.clientX, e.clientY));
  document.addEventListener('mouseup', end);

  handle.addEventListener('touchstart', e => {
    if (e.target.closest('button')) return;
    const t = e.touches[0]; begin(t.clientX, t.clientY); e.preventDefault();
  }, { passive: false });
  document.addEventListener('touchmove', e => {
    if (!dragging) return; move(e.touches[0].clientX, e.touches[0].clientY); e.preventDefault();
  }, { passive: false });
  document.addEventListener('touchend', end);
})();

// ═══════════════════════════════════════════════════════════
//  EVENT WIRING
// ═══════════════════════════════════════════════════════════

document.getElementById('feedbackToggle').addEventListener('click', () => state.windowOpen ? closeWindow() : openWindow());
document.getElementById('fwClose').addEventListener('click', closeWindow);
document.getElementById('fwMinimize').addEventListener('click', toggleMinimize);
document.getElementById('versionToggle').addEventListener('click', e => { e.stopPropagation(); state.versionOpen ? closeVersionPanel() : openVersionPanel(); });
document.getElementById('closeVersionPanel').addEventListener('click', closeVersionPanel);
document.getElementById('overlay').addEventListener('click', () => { if (state.versionOpen) closeVersionPanel(); });
document.getElementById('fwSelectBtn').addEventListener('click', () => state.selectingTile ? endSelecting() : startSelecting());
document.getElementById('fwClearTarget').addEventListener('click', clearTarget);
document.getElementById('fwPost').addEventListener('click', postComment);
document.getElementById('fwTextarea').addEventListener('keydown', e => { if (e.key==='Enter' && (e.metaKey||e.ctrlKey)) postComment(); });
document.getElementById('createVersionBtn').addEventListener('click', createVersion);
document.getElementById('returnToCurrent').addEventListener('click', () => { state.viewingVersion=null; hideBanner(); if (state.windowOpen) renderFeedback(); });

document.addEventListener('click', e => {
  if (state.versionOpen &&
      !document.getElementById('versionPanel').contains(e.target) &&
      !document.getElementById('versionToggle').contains(e.target)) closeVersionPanel();
  if (state.selectingTile && !e.target.closest('.tile')) endSelecting();
});

// ═══════════════════════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════════════════════

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// ═══════════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════════

renderSitemap();
updateVersionLabel();
updateBadges();
updateFooter();
document.getElementById('sfVisitors').textContent = '—';
initVisitor(); // async — updates sfVisitors when Supabase responds
</script>
